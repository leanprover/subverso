name: CI - Build and test

on:
  workflow_call:
    inputs:
      toolchain:
        required: true
        type: string
      module-system:
        required: true
        type: boolean
      os:
        required: false
        type: string
        default: nscloud-ubuntu-22.04-amd64-8x16
      installer:
        required: false
        type: string
        default: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none


jobs:
  build:
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false

    name: Build and test ${{ inputs.module-system && '(with modules) ' || '(without modules) ' }}(${{ inputs.os }}, ${{ inputs.installer}}, ${{ inputs.toolchain}})
    
    steps:
      - name: Install elan
        run: |
          set -o pipefail
          ${{ inputs.installer }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Which lake?
        run: |
          which lake

      - uses: actions/checkout@v6

      - name: Demodulize if needed
        if: ${{ !inputs.module-system }}
        run: |
          python3 demodulize.py src

      - name: List all files
        run: |
          find . -name "*.lean" -type f

      - name: Select Lean version
        run: |
          echo "leanprover/lean4:${{ inputs.toolchain }}" > lean-toolchain

      - name: Install Lean toolchain
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: elan run --install leanprover/lean4:${{ inputs.toolchain }} lean --version

      - name: Install demo Lean toolchain
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: elan run --install leanprover/lean4:v4.3.0 lean --version

      - name: Install TOML demo Lean toolchain
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: elan run --install leanprover/lean4:v4.8.0 lean --version

      - name: Install compatibility test Lean toolchain
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: elan run --install leanprover/lean4:4.10.0 lean --version

      - name: Lean version
        run: |
          lean --version

      - name: Cache .lake
        uses: actions/cache@v5
        with:
          path: .lake
          key: ${{ runner.os }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lean-toolchain') }}

      - name: Build the project
        run: |
          lake build

      # Restore the demo builds whose toolchains are fixed (shared
      # across all matrix jobs), warmed by the `prebuild` job. Only
      # the `.lake` directories are cached; source/config trees are
      # always refreshed from checkout by the test driver.
      - name: Restore prebuilt demo-toml (4.8.0)
        uses: actions/cache/restore@v5
        with:
          path: |
            .builds/leanprover-lean4-v4.8.0/demo-toml/.lake
            .builds/leanprover-lean4-v4.8.0/demo-toml/no-mod/.lake
          key: subverso-build-demo-toml-v4.8.0-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('*.lean', 'lean-toolchain', 'demodulize.py', 'src/**/*.lean', 'demo/**/*.lean', 'demo/lakefile.lean', 'demo/lean-toolchain', 'demo-toml/**/*.lean', 'demo-toml/lakefile.toml', 'demo-toml/lean-toolchain', 'small-tests/**/*.lean', 'small-tests/lakefile.lean') }}
          restore-keys: |
            subverso-build-demo-toml-v4.8.0-${{ runner.os }}-${{ runner.arch }}-
      - name: Restore prebuilt demo (4.3.0)
        uses: actions/cache/restore@v5
        with:
          path: |
            .builds/leanprover-lean4-v4.3.0/demo/.lake
            .builds/leanprover-lean4-v4.3.0/demo/no-mod/.lake
          key: subverso-build-demo-v4.3.0-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('*.lean', 'lean-toolchain', 'demodulize.py', 'src/**/*.lean', 'demo/**/*.lean', 'demo/lakefile.lean', 'demo/lean-toolchain', 'demo-toml/**/*.lean', 'demo-toml/lakefile.toml', 'demo-toml/lean-toolchain', 'small-tests/**/*.lean', 'small-tests/lakefile.lean') }}
          restore-keys: |
            subverso-build-demo-v4.3.0-${{ runner.os }}-${{ runner.arch }}-
      - name: Restore prebuilt demo (4.8.0)
        uses: actions/cache/restore@v5
        with:
          path: |
            .builds/leanprover-lean4-v4.8.0/demo/.lake
            .builds/leanprover-lean4-v4.8.0/demo/no-mod/.lake
          key: subverso-build-demo-v4.8.0-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('*.lean', 'lean-toolchain', 'demodulize.py', 'src/**/*.lean', 'demo/**/*.lean', 'demo/lakefile.lean', 'demo/lean-toolchain', 'demo-toml/**/*.lean', 'demo-toml/lakefile.toml', 'demo-toml/lean-toolchain', 'small-tests/**/*.lean', 'small-tests/lakefile.lean') }}
          restore-keys: |
            subverso-build-demo-v4.8.0-${{ runner.os }}-${{ runner.arch }}-
      - name: Restore prebuilt demo (4.10.0)
        uses: actions/cache/restore@v5
        with:
          path: |
            .builds/leanprover-lean4-4.10.0/demo/.lake
            .builds/leanprover-lean4-4.10.0/demo/no-mod/.lake
          key: subverso-build-demo-4.10.0-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('*.lean', 'lean-toolchain', 'demodulize.py', 'src/**/*.lean', 'demo/**/*.lean', 'demo/lakefile.lean', 'demo/lean-toolchain', 'demo-toml/**/*.lean', 'demo-toml/lakefile.toml', 'demo-toml/lean-toolchain', 'small-tests/**/*.lean', 'small-tests/lakefile.lean') }}
          restore-keys: |
            subverso-build-demo-4.10.0-${{ runner.os }}-${{ runner.arch }}-

      # The small-tests build uses the *matrix* toolchain, so it can't be shared across jobs — but it
      # can still be warmed run-over-run. `sanitizeToolchain('leanprover/lean4:<toolchain>')` is
      # `leanprover-lean4-<toolchain>` (see Tests.lean), which is what the build dir is named.
      - name: Cache small-tests build (matrix toolchain)
        uses: actions/cache@v5
        with:
          path: |
            .builds/leanprover-lean4-${{ inputs.toolchain }}/small-tests/.lake
            .builds/leanprover-lean4-${{ inputs.toolchain }}/small-tests/no-mod/.lake
          key: subverso-build-small-tests-${{ inputs.toolchain }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('*.lean', 'lean-toolchain', 'demodulize.py', 'src/**/*.lean', 'demo/**/*.lean', 'demo/lakefile.lean', 'demo/lean-toolchain', 'demo-toml/**/*.lean', 'demo-toml/lakefile.toml', 'demo-toml/lean-toolchain', 'small-tests/**/*.lean', 'small-tests/lakefile.lean') }}
          restore-keys: |
            subverso-build-small-tests-${{ inputs.toolchain }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Run tests
        run: |
          lake exe subverso-tests
